# ─────────────────────────────────────────────
# Satya Drishti — ViT-B/16 Deepfake Detector Training
# Fine-tunes google/vit-base-patch16-224-in21k on image forensics data
# ─────────────────────────────────────────────

model:
  name: "ViT-B/16"
  pretrained_dir: "models/image_forensics/pretrained_vit"
  num_classes: 2  # real vs fake
  input_size: 224
  freeze_blocks: 8      # freeze first 8/12 transformer blocks
  trainable_blocks: 4   # fine-tune last 4 blocks + classifier head

training:
  batch_size: 8          # fits in 4GB VRAM with AMP (ViT-B/16 is 86M params)
  epochs: 20
  learning_rate: 0.00002 # 2e-5 (lower for pretrained transformer)
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine_annealing"
  warmup_epochs: 2
  use_amp: true
  gradient_clip: 1.0
  label_smoothing: 0.1
  early_stopping_patience: 5
  early_stopping_metric: "val_auc"

data:
  dataset_dir: "datasets/image_forensics"
  manifest_path: "datasets/image_forensics/manifest.json"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

  augmentation:
    horizontal_flip: true
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.05
    random_resized_crop:
      scale: [0.8, 1.0]
    jpeg_compression:
      enabled: true
      quality_range: [30, 95]
    random_erasing:
      enabled: true
      probability: 0.1

output:
  checkpoint_dir: "models/image_forensics"
  best_model_name: "deepfake_vit_b16.pt"
  log_dir: "logs/deepfake_vit_training"
