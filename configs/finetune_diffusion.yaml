# ─────────────────────────────────────────────
# Fine-tune ViT-B/16 on diffusion-generated images
# Resumes from GAN-trained checkpoint, adds diffusion detection
# ─────────────────────────────────────────────

model:
  name: "ViT-B/16"
  pretrained_dir: "models/image_forensics/pretrained_vit"
  num_classes: 2
  input_size: 224
  freeze_blocks: 6      # unfreeze more blocks for better adaptation
  trainable_blocks: 6

training:
  batch_size: 8
  epochs: 15
  learning_rate: 0.00001  # 1e-5 (lower LR for fine-tuning existing checkpoint)
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine_annealing"
  warmup_epochs: 1
  use_amp: true
  gradient_clip: 1.0
  label_smoothing: 0.1
  early_stopping_patience: 5
  early_stopping_metric: "val_auc"

data:
  dataset_dir: "datasets/diffusion_mixed"
  manifest_path: "datasets/diffusion_mixed/manifest.json"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

  augmentation:
    horizontal_flip: true
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.05
    random_resized_crop:
      scale: [0.8, 1.0]
    jpeg_compression:
      enabled: true
      quality_range: [30, 95]
    random_erasing:
      enabled: true
      probability: 0.1

output:
  checkpoint_dir: "models/image_forensics"
  best_model_name: "deepfake_vit_b16.pt"  # overwrites old checkpoint
  log_dir: "logs/diffusion_finetune"
