services:
  - type: web
    name: satyadrishti-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-gateway.txt
    startCommand: uvicorn server.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: INFERENCE_URL
        sync: false  # Set to your HF Spaces URL, e.g. https://user-satyadrishti.hf.space
      - key: INFERENCE_SECRET
        generateValue: true
      - key: SATYA_DATABASE_URL
        sync: false  # Set to Neon.tech connection string, or use Render DB below
      - key: SATYA_JWT_SECRET
        generateValue: true
      - key: SATYA_CORS_ORIGINS
        value: https://satyadrishti.vercel.app,http://localhost:3000
      - key: SATYA_MAX_CONCURRENT_ANALYSES
        value: "2"
      - key: SATYA_LOG_FORMAT
        value: json
      - key: PYTHON_VERSION
        value: "3.10.13"

databases:
  - name: satyadrishti-db
    plan: free
    databaseName: satyadrishti
