# Satya Drishti — Prometheus Scrape Configuration
# =================================================
# Drop this into your Prometheus instance and reload.
# The gateway exposes metrics at /metrics in Prometheus exposition format
# (see server/app.py and server/metrics.py).

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: satyadrishti

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: satyadrishti-gateway
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - satyadrishti-api.onrender.com
        labels:
          service: gateway
          tier: production

  # Optional: scrape the HF Spaces inference worker too
  - job_name: satyadrishti-inference
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - user-satyadrishti.hf.space
        labels:
          service: inference
          tier: production
